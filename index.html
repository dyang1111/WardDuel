<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WardDuel | Clinical 1v1</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --danger: #ef4444; --text: #f8fafc; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .top-bar { width: 100%; padding: 15px 25px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--panel); box-sizing: border-box; }
        .logo { font-weight: 800; font-size: 1.8rem; color: var(--accent); text-decoration: none; }
        .game-board { width: 90%; max-width: 800px; background: var(--panel); margin-top: 20px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .action-btn { background: #1e293b; border: 1px solid #475569; color: white; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .search-container { position: relative; margin-top: 20px; }
        input[type="text"] { width: 100%; padding: 15px; background: #0f172a; border: 2px solid #334155; color: white; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        
        /* Dropdown Polish */
        .dropdown { 
            position: absolute; 
            width: 100%; 
            background: #1e293b; 
            border: 1px solid var(--accent); 
            max-height: 250px; /* Prevents it from going off-screen */
            overflow-y: auto; /* Adds scrollbar for massive lists */
            display: none; 
            z-index: 100; 
            border-radius: 0 0 10px 10px; 
        }
        .dropdown div { padding: 12px; cursor: pointer; border-bottom: 1px solid #334155; }
        .dropdown div:hover { background: var(--accent); color: var(--bg); }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: var(--panel); margin: 15% auto; padding: 30px; border-radius: 15px; width: 320px; border: 1px solid var(--accent); text-align: center; }
        .submit-btn { width: 100%; padding: 15px; background: var(--danger); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="logo">WARDDUEL</a>
        <div id="auth-ui">
            <button class="action-btn" onclick="document.getElementById('authModal').style.display='block'">LOG IN / SIGN UP</button>
            <a href="archive.html" style="color: var(--accent); margin-left: 15px; text-decoration: none; font-weight: bold;">ARCHIVE</a>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="auth-title">Sign Up</h2>
            <input type="text" id="username-input" placeholder="Username" style="width:90%; padding:10px; margin-bottom:10px;">
            <input type="password" id="password-input" placeholder="Password" style="width:90%; padding:10px; margin-bottom:10px;">
            <button class="submit-btn" onclick="window.processAuth()">SUBMIT</button>
            <p onclick="window.toggleAuthMode()" style="font-size:0.8rem; cursor:pointer; color:var(--accent); margin-top:10px;">Already have an account? Log In</p>
        </div>
    </div>

    <div class="game-board">
        <div id="case-title" style="font-size: 1.3rem; margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 15px;">Loading Daily Duel...</div>
        <div class="grid-buttons" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
            <button class="action-btn" onclick="reveal('hx', 10)">History (-10 HP)</button>
            <button class="action-btn" onclick="reveal('pe', 15)">Physical (-15 HP)</button>
            <button class="action-btn" onclick="reveal('lab', 20)">Labs (-20 HP)</button>
            <button class="action-btn" onclick="reveal('img', 25)">Imaging (-25 HP)</button>
        </div>
        <div id="hint-box" style="background:#0f172a; padding:15px; border-radius:8px; display:none; margin-bottom:20px;"></div>
        <div class="search-container">
            <input type="text" id="dx-input" placeholder="Search Diagnosis..." onkeyup="window.filterDx()">
            <div id="dropdown" class="dropdown"></div>
        </div>
        <button class="submit-btn" onclick="checkAnswer()">SUBMIT FINAL DIAGNOSIS</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzVNM6yylE2LF_8SfqRluqdQVRBB6i6HI",
            authDomain: "wardduel.firebaseapp.com",
            projectId: "wardduel",
            storageBucket: "wardduel.firebasestorage.app",
            messagingSenderId: "45792689084",
            appId: "1:45792689084:web:64d3e5843611b038c189b9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentCase = null;
        let hp = 100;
        let isSignUp = true;

        // Expanded Pool - Type as many as you want here
        const rawList = ["Achalasia", "Acute Cholecystitis", "Acute Pancreatitis", "Aortic Dissection", "Appendicitis", "Crohn's Disease", "Ectopic Pregnancy", "Pheochromocytoma", "Pneumothorax", "Subarachnoid Hemorrhage"];
        const diagnosisPool = [...new Set(rawList)].sort();

        async function initGame() {
            const today = new Date().toISOString().split('T')[0];
            try {
                const response = await fetch('cases.json');
                const cases = await response.json();
                currentCase = cases.find(c => c.date === today) || cases[cases.length - 1];
                document.getElementById('case-title').innerText = currentCase.hx_brief;
            } catch (e) { document.getElementById('case-title').innerText = "Error loading case. Check cases.json."; }
        }
        initGame();

        window.reveal = (type, cost) => {
            hp -= cost;
            const box = document.getElementById('hint-box');
            box.style.display = 'block';
            box.innerText = currentCase.hints[type];
        };

        window.filterDx = () => {
            let val = document.getElementById('dx-input').value.toUpperCase();
            let div = document.getElementById('dropdown');
            div.innerHTML = '';
            if(!val) { div.style.display='none'; return; }
            
            // Starts-With Search Logic
            let matches = diagnosisPool.filter(d => d.toUpperCase().startsWith(val));
            
            div.style.display = matches.length ? 'block' : 'none';
            matches.forEach(m => {
                let d = document.createElement('div');
                d.innerText = m;
                d.onclick = () => { document.getElementById('dx-input').value = m; div.style.display='none'; };
                div.appendChild(d);
            });
        };

        window.checkAnswer = async () => {
            let guess = document.getElementById('dx-input').value;
            if(guess === currentCase.answer) {
                alert(`Correct! Final Score: ${hp} HP`);
                if(auth.currentUser) {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { lastScore: hp });
                }
            } else {
                hp -= 20;
                alert("Incorrect. -20 HP Penalty.");
            }
        };

        window.toggleAuthMode = () => {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? "Sign Up" : "Log In";
        };

        window.processAuth = async () => {
            const username = document.getElementById('username-input').value;
            const userEmail = username + "@wardduel.com";
            const pass = document.getElementById('password-input').value;
            try {
                if(isSignUp) {
                    const res = await createUserWithEmailAndPassword(auth, userEmail, pass);
                    await setDoc(doc(db, "users", res.user.uid), { username: username, elo: 1000 });
                    alert("Welcome to the Wards, " + username);
                } else {
                    await signInWithEmailAndPassword(auth, userEmail, pass);
                }
                document.getElementById('authModal').style.display='none';
            } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) document.getElementById('auth-ui').innerHTML = `<span style="color:var(--accent); font-weight:bold;">DR. ${user.email.split('@')[0].toUpperCase()}</span>`;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARDDUEL | Diagnose or Die</title>

<style>
:root {
    --bg:#0b1120; --panel:#1a2235; --accent:#00f2ff;
    --danger:#ff4b4b; --text:#e2e8f0; --success:#22c55e;
}

body {
    background:var(--bg); color:var(--text);
    font-family:'Segoe UI',sans-serif;
    margin:0; display:flex; flex-direction:column; align-items:center;
}

.top-bar {
    width:100%; padding:15px 25px;
    display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid #334155;
}

.logo { color:var(--accent); font-weight:bold; text-decoration:none; font-size:1.5rem; }
.login-btn { border:1px solid var(--accent); background:none; color:var(--accent); padding:8px 15px; cursor:pointer; }

.stats-container {
    width:90%; max-width:800px;
    margin-top:20px; display:flex; justify-content:space-between; align-items:center;
}

.hp-container { flex:1; position:relative; height:30px; margin:0 15px; }
.hp-bar-bg { width:100%; height:100%; background:#334155; border-radius:15px; overflow:hidden; }
#hp-fill { height:100%; width:100%; background:var(--success); transition:0.3s; }

.hp-text-overlay {
    position:absolute; width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-weight:bold;
}

#timer-display { font-family:monospace; font-weight:bold; color:var(--accent); }

.game-board {
    width:90%; max-width:800px;
    background:var(--panel); margin-top:20px;
    padding:30px; border-radius:12px;
}

.hx-box {
    font-size:1.3rem; line-height:1.5;
    border-left:4px solid var(--accent);
    padding-left:15px; margin-bottom:20px;
}

.hint-output {
    display:none; background:#0f172a;
    padding:15px; margin-bottom:15px;
    border-radius:8px;
}

.grid-buttons {
    display:grid; grid-template-columns:1fr 1fr;
    gap:15px; margin-bottom:20px;
}

.action-btn {
    padding:15px; background:#1e293b;
    border:1px solid #475569; color:white;
    cursor:pointer; transition:0.2s;
}

.action-btn:hover {
    transform:translateY(-2px);
    border-color:var(--accent);
}

.action-btn.unlocked {
    background:#064e3b; border-color:var(--success);
    opacity:0.85;
}

input {
    width:100%; padding:15px;
    background:#0f172a; border:1px solid #475569;
    color:white;
}

.dropdown {
    position:absolute; width:100%;
    background:#1e293b; display:none;
    max-height:150px; overflow:auto;
}

.dropdown div {
    padding:10px; cursor:pointer;
}

.dropdown div:hover {
    background:var(--accent); color:black;
}

.submit-btn {
    width:100%; margin-top:15px;
    padding:15px; background:var(--danger);
    border:none; color:white; cursor:pointer;
}

.modal {
    display:none; position:fixed;
    width:100%; height:100%;
    background:rgba(0,0,0,0.8);
}

.modal-content {
    background:var(--panel);
    margin:15% auto; padding:20px;
    width:300px; text-align:center;
}

.shake { animation:shake 0.3s; }
@keyframes shake {
    0%{transform:translateX(0)}
    25%{transform:translateX(-5px)}
    50%{transform:translateX(5px)}
    75%{transform:translateX(-5px)}
    100%{transform:translateX(0)}
}
</style>
</head>

<body>

<div class="top-bar">
    <a class="logo">WARDDUEL</a>
</div>

<div class="stats-container">
    <div>TIME: <span id="timer-display">05:00</span></div>

    <div class="hp-container">
        <div class="hp-bar-bg"><div id="hp-fill"></div></div>
        <div class="hp-text-overlay">HP: <span id="hp-val">100</span></div>
    </div>
</div>

<div class="game-board">
    <div class="hx-box" id="case-hx">Loading case...</div>

    <div id="hint-display" class="hint-output"></div>

    <div class="grid-buttons">
        <button class="action-btn" onclick="getHint('hx',10)">History (-10)</button>
        <button class="action-btn" onclick="getHint('pe',15)">PE (-15)</button>
        <button class="action-btn" onclick="getHint('lab',20)">Labs (-20)</button>
        <button class="action-btn" onclick="getHint('img',25)">Imaging (-25)</button>
    </div>

    <div style="position:relative;">
        <input id="dx-input" placeholder="Search diagnosis..." onkeyup="filterDiagnosis()">
        <div id="dropdown" class="dropdown"></div>
    </div>

    <button class="submit-btn" onclick="checkDiagnosis()">SUBMIT</button>
</div>

<!-- WIN MODAL -->
<div id="winModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--success)">Correct Diagnosis</h2>
        <p id="final-score"></p>
        <button class="submit-btn" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
let hp = 100;
let timeLeft = 300;
let timer;

const caseData = {
    hx_brief: "Chest pain radiating to left arm",
    answer: "Myocardial Infarction",
    hints: {
        hx: "Diaphoresis present",
        pe: "Tachycardia",
        lab: "Elevated troponin",
        img: "ST elevation"
    }
};

document.getElementById("case-hx").innerText = caseData.hx_brief;

function startTimer(){
    timer = setInterval(()=>{
        timeLeft--;
        if(timeLeft < 60){
            document.getElementById("timer-display").style.color="red";
        }
        let m = String(Math.floor(timeLeft/60)).padStart(2,'0');
        let s = String(timeLeft%60).padStart(2,'0');
        document.getElementById("timer-display").innerText=`${m}:${s}`;
    },1000);
}
startTimer();

function updateHP(){
    if(hp<0) hp=0;
    document.getElementById("hp-val").innerText=hp;
    document.getElementById("hp-fill").style.width=hp+"%";
}

function getHint(type,cost){
    hp-=cost;
    updateHP();
    document.getElementById("hint-display").style.display="block";
    document.getElementById("hint-display").innerText=caseData.hints[type];
}

const diagnoses = ["Myocardial Infarction","Pneumonia","Asthma"];

function filterDiagnosis(){
    let input=document.getElementById("dx-input").value.toUpperCase();
    let drop=document.getElementById("dropdown");
    drop.innerHTML="";
    if(!input){ drop.style.display="none"; return; }

    diagnoses.filter(d=>d.toUpperCase().includes(input))
    .forEach(d=>{
        let div=document.createElement("div");
        div.innerText=d;
        div.onclick=()=>{
            document.getElementById("dx-input").value=d;
            drop.style.display="none";
        };
        drop.appendChild(div);
    });

    drop.style.display="block";
}

function checkDiagnosis(){
    let val=document.getElementById("dx-input").value;

    if(val===caseData.answer){
        clearInterval(timer);
        document.getElementById("final-score").innerText=`Score: ${hp}`;
        document.getElementById("winModal").style.display="block";
    } else {
        hp-=20;
        updateHP();

        document.querySelector(".game-board").classList.add("shake");
        setTimeout(()=>document.querySelector(".game-board").classList.remove("shake"),300);
    }
}
</script>

</body>
</html>

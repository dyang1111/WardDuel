<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WardDuel | Leaderboard</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#f7f9fc;
            --surface:#ffffff;
            --border:#dde3ed;
            --border-strong:#c4cdd9;
            --text:#0f172a;
            --text-muted:#475569;
            --text-subtle:#94a3b8;
            --accent:#3b82f6;
            --accent-dark:#2563eb;
            --accent-light:#eff6ff;
            --accent-border:#bfdbfe;
            --success:#16a34a;
            --success-light:#f0fdf4;
            --success-border:#bbf7d0;
            --danger:#dc2626;
            --amber:#d97706;
            --amber-light:#fffbeb;
            --amber-border:#fde68a;
            --gold:#f59e0b;
            --silver:#94a3b8;
            --bronze:#b45309;
            --radius:11px;
            --radius-sm:8px;
            --shadow:0 1px 3px rgba(15,23,42,.07),0 1px 2px rgba(15,23,42,.04);
            --shadow-md:0 4px 14px rgba(15,23,42,.10);
        }
        body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}

        /* NAV */
        .top-bar{width:100%;padding:13px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
        .logo{font-weight:900;font-size:20px;color:var(--text);text-decoration:none;letter-spacing:-.01em;display:flex;align-items:center;gap:0}
        .logo svg{margin-right:8px}
        .logo-word2{color:var(--accent)}
        .nav-right{display:flex;align-items:center;gap:14px}
        .nav-link{color:var(--text-muted);text-decoration:none;font-size:12px;font-weight:500;transition:color .15s}
        .nav-link:hover{color:var(--text)}
        .nav-link.active{color:var(--accent);font-weight:700}

        .main{width:100%;max-width:600px;padding:28px 16px 80px;display:flex;flex-direction:column;gap:14px}

        /* PAGE HEADER */
        .page-header{background:linear-gradient(135deg,#0f172a,#1e3a5f);border-radius:var(--radius);padding:24px 22px;color:#fff}
        .page-header-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.45);margin-bottom:8px}
        .page-header-title{font-size:22px;font-weight:900;letter-spacing:-.02em;margin-bottom:6px}
        .page-header-sub{font-size:13px;color:rgba(255,255,255,.6);line-height:1.5}

        /* TABS */
        .tabs{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;box-shadow:var(--shadow)}
        .tab{flex:1;padding:8px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--text-muted);transition:all .15s;text-align:center}
        .tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}

        /* YOUR RANK CARD */
        .your-rank-card{background:linear-gradient(135deg,var(--accent-light),#e0f2fe);border:1px solid var(--accent-border);border-radius:var(--radius);padding:16px 18px;display:none;align-items:center;gap:14px}
        .your-rank-card.show{display:flex}
        .your-rank-num{font-size:28px;font-weight:900;color:var(--accent);min-width:40px;text-align:center}
        .your-rank-info{flex:1}
        .your-rank-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:3px}
        .your-rank-name{font-size:14px;font-weight:800;color:var(--text)}
        .your-rank-score{font-size:12px;color:var(--text-muted)}

        /* LEADERBOARD TABLE */
        .lb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
        .lb-header{display:grid;grid-template-columns:40px 1fr 70px 60px;gap:0;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
        .lb-header-cell{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-subtle)}
        .lb-header-cell.right{text-align:right}

        .lb-row{display:grid;grid-template-columns:40px 1fr 70px 60px;gap:0;padding:12px 16px;border-bottom:1px solid #f1f5f9;align-items:center;transition:background .1s}
        .lb-row:last-child{border-bottom:none}
        .lb-row:hover{background:#f8fafc}
        .lb-row.me{background:var(--accent-light);border-left:3px solid var(--accent)}
        .lb-row.me:hover{background:#e0ecff}
        .lb-row.rank-1{background:linear-gradient(90deg,#fffbeb,#fff)}
        .lb-row.rank-2{background:linear-gradient(90deg,#f8fafc,#fff)}
        .lb-row.rank-3{background:linear-gradient(90deg,#fff7ed,#fff)}

        .rank-cell{font-size:14px;font-weight:800;color:var(--text-subtle)}
        .rank-cell.gold{color:var(--gold)}
        .rank-cell.silver{color:var(--silver)}
        .rank-cell.bronze{color:var(--bronze)}

        .player-cell{display:flex;align-items:center;gap:10px;min-width:0}
        .player-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0}
        .player-info{min-width:0}
        .player-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .player-level{font-size:10px;font-weight:600;color:var(--accent)}
        .me-tag{font-size:9px;font-weight:800;background:var(--accent);color:#fff;padding:1px 5px;border-radius:3px;margin-left:5px;flex-shrink:0}

        .streak-cell{text-align:center;font-size:12px;font-weight:700;color:var(--amber)}
        .score-cell{text-align:right;font-size:14px;font-weight:800;color:var(--text)}

        /* EMPTY / LOADING */
        .lb-empty{padding:52px 24px;text-align:center}
        .lb-empty-icon{font-size:2.4rem;margin-bottom:14px}
        .lb-empty-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:6px}
        .lb-empty-sub{font-size:13px;color:var(--text-muted);line-height:1.6;max-width:300px;margin:0 auto 20px}
        .lb-empty-cta{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
        .lb-empty-cta:hover{opacity:.85}

        .loading-rows{display:flex;flex-direction:column;gap:0}
        .loading-row{padding:12px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:12px}
        .skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:5px}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .sk-circle{width:32px;height:32px;border-radius:50%;flex-shrink:0}
        .sk-text{height:12px;flex:1;max-width:140px}
        .sk-num{width:40px;height:14px;margin-left:auto}

        /* PERIOD NOTE */
        .period-note{font-size:11px;color:var(--text-subtle);text-align:center;padding:8px 0}

        .disclaimer{font-size:11px;color:var(--text-subtle);text-align:center;max-width:500px;padding:0 16px 48px;line-height:1.7}
    </style>
</head>

    if(iconType==='heart'){
        const s=size;
        return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" style="border-radius:50%;border:2px solid #fecaca;background:#fef2f2;overflow:hidden;display:block"><path d="M${s/2},${s*.78} Q${s*.15},${s*.56} ${s*.15},${s*.38} Q${s*.15},${s*.22} ${s*.35},${s*.22} Q${s*.43},${s*.22} ${s/2},${s*.33} Q${s*.57},${s*.22} ${s*.65},${s*.22} Q${s*.85},${s*.22} ${s*.85},${s*.38} Q${s*.85},${s*.56} ${s/2},${s*.78} Z" fill="#dc2626"/></svg>`;
    }
    if(iconType==='bones'){
        const c=size/2;
        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="border-radius:50%;border:2px solid #dde3ed;background:#f7f9fc;overflow:hidden;display:block"><circle cx="${size*.24}" cy="${size*.24}" r="${size*.12}" fill="#475569"/><circle cx="${size*.76}" cy="${size*.76}" r="${size*.12}" fill="#475569"/><rect x="${c-4}" y="${size*.1}" width="8" height="${size*.8}" rx="4" fill="#475569" transform="rotate(-45 ${c} ${c})"/><circle cx="${size*.76}" cy="${size*.24}" r="${size*.12}" fill="#475569"/><circle cx="${size*.24}" cy="${size*.76}" r="${size*.12}" fill="#475569"/><rect x="${c-4}" y="${size*.1}" width="8" height="${size*.8}" rx="4" fill="#475569" transform="rotate(45 ${c} ${c})"/><circle cx="${c}" cy="${c}" r="${size*.1}" fill="#f7f9fc"/></svg>`;
    }
    if(iconType==='cross'){
        const c=size/2,w=size*.14,t=size*.12;
        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="border-radius:50%;border:2px solid #bfdbfe;background:#eff6ff;overflow:hidden;display:block"><rect x="${c-w/2}" y="${t}" width="${w}" height="${size-t*2}" rx="${w/2}" fill="#3b82f6"/><rect x="${t}" y="${c-w/2}" width="${size-t*2}" height="${w}" rx="${w/2}" fill="#3b82f6"/></svg>`;
    }
    if(iconType==='character'){
        const A=ANIMALS[animalIdx]||ANIMALS[0];
        const C=SC[colorIdx]||SC[0];
        const S=SP[specIdx]||SP[0];
        const scale=size/90;
        const lvl=levelIdx||0;
        let body='';
        if(lvl===0){body=`<ellipse cx="45" cy="96" rx="24" ry="25" fill="${A.b}"/><ellipse cx="45" cy="100" rx="15" ry="18" fill="${A.f}"/><ellipse cx="20" cy="88" rx="9" ry="15" fill="${A.b}" transform="rotate(-8 20 88)"/><ellipse cx="70" cy="88" rx="9" ry="15" fill="${A.b}" transform="rotate(8 70 88)"/>`;}
        else{body=`<rect x="16" y="66" width="58" height="42" rx="8" fill="${C.v}"/><polygon points="45,66 33,74 45,79 57,74" fill="${C.d}"/><rect x="2" y="67" width="16" height="32" rx="8" fill="${C.v}"/><rect x="72" y="67" width="16" height="32" rx="8" fill="${C.v}"/><ellipse cx="10" cy="101" rx="8" ry="6" fill="${A.l}"/><ellipse cx="80" cy="101" rx="8" ry="6" fill="${A.l}"/>`;}
        const neck=`<rect x="36" y="57" width="18" height="13" rx="5" fill="${A.b}"/>`;
        const head=HEADS[A.nm]||'';
        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="border-radius:50%;border:2px solid #bfdbfe;background:#eff6ff;overflow:hidden;display:block"><g transform="translate(${size/2},${size/2}) scale(${scale*0.95}) translate(-45,-58)">${body}${neck}${head}</g></svg>`;
    }
    return logoSVG(size);
}


async function loadAllTime(){
    document.getElementById('period-note').innerText = 'Ranked by total points earned across all cases.';
    const snap = await getDocs(query(collection(db,'users'), orderBy('totalPts','desc'), limit(25)));
    return snap.docs.map(d=>({
        uid: d.id,
        name: d.data().username || 'Doctor',
        pts: d.data().totalPts || 0,
        streak: d.data().streak || 0,
        level: getLevelName(d.data().totalPts || 0),
        iconPrefs: d.data().iconType ? {iconType:d.data().iconType,animalIdx:d.data().animalIdx||0,colorIdx:d.data().colorIdx||0,specIdx:d.data().specIdx||0,levelIdx:0} : null
    }));
}

async function loadWeekly(){
    const weekStart = getWeekStart();
    document.getElementById('period-note').innerText = `Points earned since ${weekStart.replace(/-/g,'/')} (this week).`;
    const snap = await getDocs(query(
        collection(db,'scores'),
        where('caseDate','>=',weekStart),
        where('isArchive','==',false)
    ));
    const userPts = {};
    const userNames = {};
    const userStreaks = {};
    const userIcons = {};
    snap.forEach(d=>{
        const data = d.data();
        if(!data.uid) return;
        userPts[data.uid] = (userPts[data.uid]||0) + (data.score||0);
        userNames[data.uid] = data.username || 'Doctor';
        userStreaks[data.uid] = data.streak || 0;
        if(data.iconPrefs) userIcons[data.uid] = data.iconPrefs;
    });
    return Object.entries(userPts)
        .map(([uid,pts])=>({uid,name:userNames[uid],pts,streak:userStreaks[uid]||0,level:'',iconPrefs:userIcons[uid]||null}))
        .sort((a,b)=>b.pts-a.pts)
        .slice(0,25);
}

async function loadToday(){
    const today = getTodayCST();
    document.getElementById('period-note').innerText = `Today's scores — ${today.replace(/-/g,'/')}.`;
    const snap = await getDocs(query(
        collection(db,'scores'),
        where('caseDate','==',today),
        where('isArchive','==',false)
    ));
    const rows = snap.docs.map(d=>({
        uid: d.data().uid,
        name: d.data().username || 'Doctor',
        pts: d.data().score || 0,
        streak: 0,
        level: '',
        iconPrefs: d.data().iconPrefs || null
    })).sort((a,b)=>b.pts-a.pts).slice(0,25);
    return rows;
}

async function loadAndRender(){
    const body = document.getElementById('lb-body');
    body.innerHTML = `<div class="loading-rows">${[1,2,3,4,5].map(()=>`<div class="loading-row"><div class="skeleton sk-circle"></div><div class="skeleton sk-text"></div><div class="skeleton sk-num"></div></div>`).join('')}</div>`;

    try {
        let rows = [];
        if(currentTab==='alltime') rows = await loadAllTime();
        else if(currentTab==='weekly') rows = await loadWeekly();
        else rows = await loadToday();

        if(rows.length === 0){
            body.innerHTML = `
                <div class="lb-empty">
                    <div class="lb-empty-icon">🩺</div>
                    <div class="lb-empty-title">No scores yet</div>
                    <div class="lb-empty-sub">Be the first doctor on the board. Play today's case and stake your claim.</div>
                    <button class="lb-empty-cta" onclick="window.location.href='index.html'">Play Today's Case →</button>
                </div>`;
            document.getElementById('your-rank-card').classList.remove('show');
            return;
        }

        // Find current user rank
        const myIdx = currentUser ? rows.findIndex(r=>r.uid===currentUser.uid) : -1;
        if(myIdx >= 0 && currentUser){
            const myRow = rows[myIdx];
            document.getElementById('your-rank-card').classList.add('show');
            document.getElementById('your-rank-num').innerText = `#${myIdx+1}`;
            document.getElementById('your-rank-name').innerText = `Dr. ${myRow.name.toUpperCase()}`;
            document.getElementById('your-rank-score').innerText = currentTab==='alltime'
                ? `${myRow.pts.toLocaleString()} total pts · ${myRow.level}`
                : `${myRow.pts.toLocaleString()} pts`;
        } else {
            document.getElementById('your-rank-card').classList.remove('show');
        }

        const rankEmoji = ['🥇','🥈','🥉'];
        const rankClass = ['gold','silver','bronze'];
        const rowClass = ['rank-1','rank-2','rank-3'];

        body.innerHTML = rows.map((r,i)=>{
            const isMe = currentUser && r.uid === currentUser.uid;
            const rankDisplay = i < 3
                ? `<span class="rank-cell ${rankClass[i]}">${rankEmoji[i]}</span>`
                : `<span class="rank-cell">${i+1}</span>`;
            const streakDisplay = r.streak > 0 ? `${r.streak} 🔥` : '—';
            const ptsDisplay = currentTab==='alltime' ? r.pts.toLocaleString() : r.pts;
            return `
                <div class="lb-row ${rowClass[i]||''} ${isMe?'me':''}">
                    ${rankDisplay}
                    <div class="player-cell">
                        ${renderPlayerIcon(r.iconPrefs, 32)}
                        <div class="player-info">
                            <div class="player-name">Dr. ${r.name.toUpperCase()}${isMe?'<span class="me-tag">YOU</span>':''}</div>
                            ${r.level?`<div class="player-level">${r.level}</div>`:''}
                        </div>
                    </div>
                    <div class="streak-cell">${streakDisplay}</div>
                    <div class="score-cell">${ptsDisplay}</div>
                </div>`;
        }).join('');

    } catch(e){
        console.error(e);
        body.innerHTML = `<div class="lb-empty"><div class="lb-empty-icon">⚠️</div><div class="lb-empty-title">Failed to load</div><div class="lb-empty-sub">Check your connection and try again.</div></div>`;
    }
}

window.switchTab = function(tab){
    currentTab = tab;
    ['alltime','weekly','today'].forEach(t=>{
        document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
    });
    loadAndRender();
};

onAuthStateChanged(auth, async(user)=>{
    currentUser = user;
    loadAndRender();
});
</script>
